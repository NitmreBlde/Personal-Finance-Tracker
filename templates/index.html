<!DOCTYPE html>
<html>

<head>

<title>Finance Tracker</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>💰 Tracker</h2>

<ul>

<li onclick="showSection('dashboard')">Dashboard</li>
<li onclick="showSection('transactions')">Transactions</li>
<li onclick="showSection('analytics')">Analytics</li>
<li onclick="showSection('budgets')">Budgets</li>
<li onclick="showSection('settings')">Settings</li>

</ul>

</div>



<div class="main">

<!-- DASHBOARD -->

<section id="dashboard-section">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Balance</h3>
<h2 id="balance">₹0</h2>
</div>

<div class="card">
<h3>Income</h3>
<h2 id="income">₹0</h2>
</div>

<div class="card">
<h3>Expense</h3>
<h2 id="expense">₹0</h2>
</div>

</div>

<div class="chart-box">
<canvas id="expenseChart"></canvas>
</div>

</section>



<!-- TRANSACTIONS -->

<section id="transactions-section" class="hidden">

<h1>Transactions</h1>

<div class="transaction-form">

<input id="amount" placeholder="Amount">

<select id="category">
<option>Food</option>
<option>Shopping</option>
<option>Transport</option>
</select>

<select id="type">
<option>Income</option>
<option>Expense</option>
</select>

<input id="date" type="date">

<button onclick="addTransaction()">Add</button>

</div>


<table>

<thead>
<tr>
<th>Date</th>
<th>Category</th>
<th>Type</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="transaction-table">

</tbody>

</table>

</section>



<!-- ANALYTICS -->

<section id="analytics-section" class="hidden">

<h1>Analytics</h1>

<div class="chart-box">

<canvas id="analyticsChart"></canvas>

</div>

</section>



<!-- BUDGETS -->

<section id="budgets-section" class="hidden">

<h1>Budgets</h1>

<div class="budget">

<p>Food</p>

<div class="progress">

<div class="bar" style="width:60%"></div>

</div>

</div>

<div class="budget">

<p>Shopping</p>

<div class="progress">

<div class="bar" style="width:40%"></div>

</div>

</div>

</section>



<!-- SETTINGS -->

<section id="settings-section" class="hidden">

<h1>Settings</h1>

<label>Name</label>
<input type="text">

<label>Currency</label>

<select>
<option>INR</option>
<option>USD</option>
<option>EUR</option>
</select>

<button>Save</button>

</section>

</div>

</div>

<script src="/static/script.js"></script>

</body>

</html>
